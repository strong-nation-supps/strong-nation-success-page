<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Verified</title>

  <!-- 🎉 Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    /* Full screen image (auto fit all phones) */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* 🔥 KEY LINE */
    }

    /* Bottom text */
    .text {
      position: absolute;
      bottom: 25px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 14px;
      opacity: 0.8;
      z-index: 2;
    }
  </style>
</head>

<body>

  <!-- 🔥 FULLSCREEN IMAGE -->
  <img 
    class="bg" 
    src="https://cdn.shopify.com/s/files/1/0651/8492/3725/files/WhatsApp_Image_2026-03-27_at_4.25.49_PM.jpg?v=1774609958" 
    alt="Authentic Poster"
  >

  <div class="text">Redirecting to product page...</div>

  <script>
    // 🎆 Cracker Confetti Effect
    function fireCrackers() {
      var duration = 1500;
      var end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 6,
          angle: 60,
          spread: 60,
          origin: { x: 0 }
        });

        confetti({
          particleCount: 6,
          angle: 120,
          spread: 60,
          origin: { x: 1 }
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }

    fireCrackers();

    // 🔍 Product detect
    const params = new URLSearchParams(window.location.search);
    const product = params.get("product");

    let redirectURL = "https://strongnation.in";

    if (product === "smg") {
      redirectURL = "https://strongnation.in/products/strength-muscle-gainz";
    } 
    else if (product === "eaa") {
      redirectURL = "https://strongnation.in/products/eaa-shredz";
    } 
    else if (product === "tiger") {
      redirectURL = "https://strongnation.in/products/tiger-fury-pre-workout";
    } 
    else if (product === "darkside") {
      redirectURL = "https://strongnation.in/products/freaky-wolf-darkside-pre-workout";
    } 
    else if (product === "extreme") {
      redirectURL = "https://strongnation.in/products/freaky-wolf-extreme";
    } 
    else if (product === "pump") {
      redirectURL = "https://strongnation.in/products/pump-hunter";
    } 
    else if (product === "trophy") {
      redirectURL = "https://strongnation.in/products/trophy-body-fat-burner";
    } 
    else if (product === "fishoil") {
      redirectURL = "https://strongnation.in/products/fish-oil-3x";
    } 
    else if (product === "magnesium") {
      redirectURL = "https://strongnation.in/products/magnesium-glycinate";
    } 
    else if (product === "liver") {
      redirectURL = "https://strongnation.in/products/liver-kidney-strength";
    }

    // ⏳ Redirect after 3 sec
    setTimeout(() => {
      window.location.href = redirectURL;
    }, 3000);
  </script>

</body>
</html>
