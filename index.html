<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Verified</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .checkmark {
      font-size: 70px;
      color: #22c55e;
      animation: pop 0.6s ease;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      80% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    h1 {
      font-size: 22px;
      margin-top: 20px;
    }

    p {
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="checkmark">✔</div>
    <h1>Your Product is Authentic</h1>
    <p>Redirecting you...</p>
  </div>

  <script>
    // 🎉 Confetti
    confetti({
      particleCount: 200,
      spread: 100,
      origin: { y: 0.6 }
    });

    // 🔍 Get product from URL
    const params = new URLSearchParams(window.location.search);
    const product = params.get("product");

    let redirectURL = "https://strongnation.in";

    // 🔗 ALL PRODUCT MAPPING
    if (product === "smg") {
      redirectURL = "https://strongnation.in/products/strength-muscle-gainz";
    } 
    else if (product === "eaa") {
      redirectURL = "https://strongnation.in/products/eaa-shredz";
    } 
    else if (product === "tiger") {
      redirectURL = "https://strongnation.in/products/tiger-fury-pre-workout";
    } 
    else if (product === "darkside") {
      redirectURL = "https://strongnation.in/products/freaky-wolf-darkside-pre-workout";
    } 
    else if (product === "extreme") {
      redirectURL = "https://strongnation.in/products/freaky-wolf-extreme";
    } 
    else if (product === "pump") {
      redirectURL = "https://strongnation.in/products/pump-hunter";
    } 
    else if (product === "trophy") {
      redirectURL = "https://strongnation.in/products/trophy-body-fat-burner";
    } 
    else if (product === "fishoil") {
      redirectURL = "https://strongnation.in/products/fish-oil-3x";
    } 
    else if (product === "magnesium") {
      redirectURL = "https://strongnation.in/products/magnesium-glycinate";
    } 
    else if (product === "liver") {
      redirectURL = "https://strongnation.in/products/liver-kidney-strength";
    }

    // ⏳ Redirect after 5 sec
    setTimeout(() => {
      window.location.href = redirectURL;
    }, 5000);
  </script>

</body>
</html>
